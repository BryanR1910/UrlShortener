<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Link Shortener</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #1f1f1f;
            --border-hover: #2e2e2e;
            --text: #f0f0f0;
            --muted: #555;
            --accent: #c8f562;
            --accent-dark: #a8d445;
            --danger: #ff4d4d;
            --radius: 12px;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 48px 24px;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            margin-bottom: 64px;
            animation: fadeUp 0.6s ease both;
        }

        .badge {
            display: inline-block;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 4px 10px;
            border-radius: 100px;
            margin-bottom: 20px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            color: var(--muted);
            font-size: 15px;
            font-weight: 400;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            color: var(--muted);
            text-decoration: none;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            transition: color 0.2s;
        }

        .github-link:hover { color: var(--text); }

        .github-link svg { width: 16px; height: 16px; }

        /* Input section */
        .input-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 40px;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        .input-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 14px;
            font-family: 'DM Mono', monospace;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]::placeholder { color: var(--muted); }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        button.primary {
            background: var(--accent);
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, transform 0.1s;
        }

        button.primary:hover { background: var(--accent-dark); }
        button.primary:active { transform: scale(0.98); }

        /* Toast */
        .toast {
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--danger);
            animation: fadeUp 0.3s ease;
        }

        .toast.show { display: flex; }

        /* URLs section */
        .urls-section {
            animation: fadeUp 0.6s 0.2s ease both;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-family: 'DM Mono', monospace;
        }

        #pageInfo {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        /* URL list */
        #urlContainer {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 80px;
        }

        .url-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            transition: border-color 0.2s;
            animation: fadeUp 0.3s ease both;
        }

        .url-card:hover { border-color: var(--border-hover); }

        .url-info { flex: 1; min-width: 0; }

        .short-url {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            text-decoration: none;
            display: block;
            margin-bottom: 4px;
        }

        .short-url:hover { text-decoration: underline; }

        .access-count {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .copy-btn.copied {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 48px;
            color: var(--muted);
            font-size: 14px;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        button.page-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.page-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
        }

        button.page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">

    <header>
        <div class="badge">Portfolio Project</div>
        <h1>Shorten any<br><span>link, instantly.</span></h1>
        <p class="subtitle">Fast, reliable URL shortener built with Spring Boot + PostgreSQL.</p>
        <a class="github-link" href="https://github.com/BRYANR1910" target="_blank">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            github.com/BRYANR1910
        </a>
    </header>

    <div class="input-section">
        <span class="input-label">Paste your long URL</span>
        <div class="input-row">
            <input id="urlInput" type="text" placeholder="https://example.com/very/long/url..."/>
            <button class="primary" onclick="createShortUrl()">Shorten</button>
        </div>
        <div class="toast" id="errorToast">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="errorMsg">Error creating short URL</span>
        </div>
    </div>

    <div class="urls-section">
        <div class="section-header">
            <span class="section-title">Shortened URLs</span>
            <span id="pageInfo"></span>
        </div>

        <div id="urlContainer"></div>

        <div class="pagination">
            <button class="page-btn" id="prevBtn" onclick="previousPage()">← Prev</button>
            <button class="page-btn" id="nextBtn" onclick="nextPage()">Next →</button>
        </div>
    </div>

</div>

<script>
    let currentPage = 0;
    let totalPages = 1;
    const pageSize = 10;

    function loadUrls(page) {
        fetch(`/short-urls?page=${page}&size=${pageSize}`)
            .then(res => res.json())
            .then(data => {
                currentPage = data.number;
                totalPages = data.totalPages;

                const container = document.getElementById("urlContainer");
                container.innerHTML = "";

                if (data.content.length === 0) {
                    container.innerHTML = '<div class="empty">No shortened URLs yet. Create your first one above.</div>';
                } else {
                    data.content.forEach((url, i) => {
                        const shortUrl = window.location.origin + "/" + url.shortCode;
                        const card = document.createElement("div");
                        card.className = "url-card";
                        card.style.animationDelay = `${i * 40}ms`;
                        card.innerHTML = `
                            <div class="url-info">
                                <a class="short-url" href="/${url.shortCode}" target="_blank">${shortUrl}</a>
                                <span class="access-count">${url.accessCount} visit${url.accessCount !== 1 ? 's' : ''}</span>
                            </div>
                            <button class="copy-btn" onclick="copyUrl(this, '${shortUrl}')">Copy</button>
                        `;
                        container.appendChild(card);
                    });
                }

                document.getElementById("pageInfo").innerText =
                    totalPages > 0 ? `${currentPage + 1} / ${totalPages}` : "";

                document.getElementById("prevBtn").disabled = currentPage === 0;
                document.getElementById("nextBtn").disabled = currentPage >= totalPages - 1;
            });
    }

    function copyUrl(btn, url) {
        navigator.clipboard.writeText(url).then(() => {
            btn.textContent = "Copied!";
            btn.classList.add("copied");
            setTimeout(() => {
                btn.textContent = "Copy";
                btn.classList.remove("copied");
            }, 1500);
        });
    }

    function createShortUrl() {
        const input = document.getElementById("urlInput");
        const toast = document.getElementById("errorToast");
        const errorMsg = document.getElementById("errorMsg");
        toast.classList.remove("show");

        if (!input.value.trim()) {
            errorMsg.textContent = "Please enter a URL.";
            toast.classList.add("show");
            return;
        }

        fetch("/short-urls", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: input.value.trim() })
        })
        .then(res => {
            if (!res.ok) throw new Error("Failed");
            return res.json();
        })
        .then(() => {
            input.value = "";
            loadUrls(0);
        })
        .catch(() => {
            errorMsg.textContent = "Error creating short URL. Please try again.";
            toast.classList.add("show");
        });
    }

    function nextPage() { if (currentPage < totalPages - 1) loadUrls(currentPage + 1); }
    function previousPage() { if (currentPage > 0) loadUrls(currentPage - 1); }

    document.addEventListener("DOMContentLoaded", () => loadUrls(0));
</script>

</body>
</html>
